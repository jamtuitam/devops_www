<main class="layout">
  <section class="map-panel">
    <div class="map-wrapper">
      <div class="map-frame">
        <div class="map-canvas" role="img" aria-label="Mapa Polski z zaznaczonymi sondami" (click)="onMapCanvasClick()">
          <img src="mapa.svg" alt="Mapa Polski" class="poland-map-image">

          <ng-container *ngFor="let group of groupedAreas">
            <button
              type="button"
              class="marker"
              [class.marker-group]="group.isGrouped"
              [class.active]="isGroupActive(group)"
              [ngClass]="getMarkerStatusClass(group)"
              [style.left.%]="group.position.x"
              [style.top.%]="group.position.y"
              [attr.aria-label]="group.title"
              (click)="onMarkerActivate(group, $event)"
              (keydown)="onMarkerKeydown(group, $event)">
            </button>

            <button
              type="button"
              class="marker-label"
              [class.marker-label-group]="group.isGrouped"
              [class.active]="isGroupActive(group)"
              [ngClass]="getMarkerStatusClass(group)"
              [style.left.%]="group.position.x"
              [style.top.%]="group.position.y"
              [attr.aria-label]="group.title"
              (click)="onMarkerActivate(group, $event)">
              {{ group.title }}
            </button>
          </ng-container>

          <div
            *ngIf="openGroup"
            class="map-group-panel"
            [style.left.%]="openGroup.position.x"
            [style.top.%]="openGroup.position.y"
            (click)="$event.stopPropagation()">
            <div class="map-group-title">{{ openGroup.area }}</div>
            <ul class="map-group-list">
              <li *ngFor="let member of openGroup.members">
                <button type="button" class="map-group-item" (click)="selectProbe(member.name)">
                  {{ member.name }}
                </button>
              </li>
            </ul>
          </div>

          <div class="map-legend" aria-hidden="true">
            <span class="legend-dot"></span>
            <span>Aktywna sonda</span>
          </div>
        </div>
      </div>
    </div>
  </section>

  <section class="list-panel">
    <section class="collapsible-section service-section" [class.is-expanded]="sectionsExpanded.sondy" aria-labelledby="sondy-heading">
      <h2 id="sondy-heading">
        <button type="button" class="section-toggle" [attr.aria-expanded]="sectionsExpanded.sondy" (click)="toggleSection('sondy')">
          Sondy
        </button>
      </h2>
      <ul id="elements-list" class="section-body" aria-label="Lista sond">
        <li *ngFor="let item of sondyItems">
          <button
            type="button"
            class="service-link panel-item"
            [class.active]="item.probeName === selectedProbe"
            [attr.data-availability]="getAvailability(item)"
            (click)="onPanelItemClick(item)">
            <span class="panel-item-main">{{ item.label }}</span>
            <span class="availability-dot" aria-hidden="true"></span>
          </button>
          <div *ngIf="expandedItemKey === item.key" class="expand-panel">
            <div class="expand-actions">
              <a class="action-button" [href]="item.url" target="_blank" rel="noopener noreferrer">PRZEJDZ</a>
              <button type="button" class="action-button secondary" (click)="toggleDetails(item.key, $event)">SZCZEGOLY</button>
            </div>
            <dl *ngIf="isDetailsVisible(item.key)" class="details-list">
              <div>
                <dt>IP:</dt>
                <dd>{{ item.ip }}</dd>
              </div>
              <div>
                <dt>Kontakt:</dt>
                <dd>{{ item.contact }}</dd>
              </div>
            </dl>
          </div>
        </li>
      </ul>
    </section>

    <section class="collapsible-section service-section" [class.is-expanded]="sectionsExpanded.riverbed" aria-labelledby="riverbed-heading">
      <h3 id="riverbed-heading">
        <button type="button" class="section-toggle" [attr.aria-expanded]="sectionsExpanded.riverbed" (click)="toggleSection('riverbed')">
          Riverbed
        </button>
      </h3>
      <ul class="service-list section-body" aria-label="Uslugi Riverbed">
        <li *ngFor="let item of riverbedItems">
          <button
            type="button"
            class="service-link panel-item"
            [attr.data-availability]="getAvailability(item)"
            (click)="onPanelItemClick(item)">
            <span class="panel-item-main">{{ item.label }}</span>
            <span class="availability-dot" aria-hidden="true"></span>
          </button>
          <div *ngIf="expandedItemKey === item.key" class="expand-panel">
            <div class="expand-actions">
              <a class="action-button" [href]="item.url" target="_blank" rel="noopener noreferrer">PRZEJDZ</a>
              <button type="button" class="action-button secondary" (click)="toggleDetails(item.key, $event)">SZCZEGOLY</button>
            </div>
            <dl *ngIf="isDetailsVisible(item.key)" class="details-list">
              <div>
                <dt>IP:</dt>
                <dd>{{ item.ip }}</dd>
              </div>
              <div>
                <dt>Kontakt:</dt>
                <dd>{{ item.contact }}</dd>
              </div>
            </dl>
          </div>
        </li>
      </ul>
    </section>

    <section class="collapsible-section service-section" [class.is-expanded]="sectionsExpanded.ibm" aria-labelledby="ibm-heading">
      <h3 id="ibm-heading">
        <button type="button" class="section-toggle" [attr.aria-expanded]="sectionsExpanded.ibm" (click)="toggleSection('ibm')">
          IBM Tivoli
        </button>
      </h3>
      <ul class="service-list section-body" aria-label="Uslugi IBM Tivoli">
        <li *ngFor="let item of ibmItems">
          <button
            type="button"
            class="service-link panel-item"
            [attr.data-availability]="getAvailability(item)"
            (click)="onPanelItemClick(item)">
            <span class="panel-item-main">{{ item.label }}</span>
            <span class="availability-dot" aria-hidden="true"></span>
          </button>
          <div *ngIf="expandedItemKey === item.key" class="expand-panel">
            <div class="expand-actions">
              <a class="action-button" [href]="item.url" target="_blank" rel="noopener noreferrer">PRZEJDZ</a>
              <button type="button" class="action-button secondary" (click)="toggleDetails(item.key, $event)">SZCZEGOLY</button>
            </div>
            <dl *ngIf="isDetailsVisible(item.key)" class="details-list">
              <div>
                <dt>IP:</dt>
                <dd>{{ item.ip }}</dd>
              </div>
              <div>
                <dt>Kontakt:</dt>
                <dd>{{ item.contact }}</dd>
              </div>
            </dl>
          </div>
        </li>
      </ul>
    </section>
  </section>
</main>
