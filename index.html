<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DevOPS Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="top-bar">
    <h1>DevOPS</h1>
    <nav class="tools-nav" aria-label="Narzędzia DevOPS">
      <a href="#" target="_blank" rel="noopener noreferrer">Riverbed NetIM</a>
      <a href="#" target="_blank" rel="noopener noreferrer">Riverbed NetProfiler</a>
      <a href="#" target="_blank" rel="noopener noreferrer">Riverbed Portal</a>
      <a href="#" target="_blank" rel="noopener noreferrer">Riverbed FlowGateway</a>
      <a href="#" target="_blank" rel="noopener noreferrer">IBM Tivoli</a>
      <details class="dropdown">
        <summary>Sondy</summary>
        <ul>
          <li><button type="button" class="probe-link" data-probe="Legionowo">Legionowo</button></li>
          <li><button type="button" class="probe-link" data-probe="Bydgoszcz">Bydgoszcz</button></li>
          <li><button type="button" class="probe-link" data-probe="Wrocław">Wrocław</button></li>
          <li><button type="button" class="probe-link" data-probe="Kraków">Kraków</button></li>
          <li><button type="button" class="probe-link" data-probe="Gdynia">Gdynia</button></li>
          <li><button type="button" class="probe-link" data-probe="Rakowiecka">Rakowiecka</button></li>
          <li><button type="button" class="probe-link" data-probe="Wawelska">Wawelska</button></li>
          <li><button type="button" class="probe-link" data-probe="Radiowa">Radiowa</button></li>
          <li><button type="button" class="probe-link" data-probe="Opole">Opole</button></li>
        </ul>
      </details>
    </nav>
  </header>

  <main class="layout">
    <section class="map-panel">
      <div class="map-header">
        <div>
        </div>
        <div class="map-status">9 aktywnych punktów</div>
      </div>
      <div class="map-wrapper">
        <div class="map-frame">
          <div class="map-canvas" role="img" aria-label="Mapa Polski z zaznaczonymi sondami">
            <img src="mapa.svg" alt="Mapa Polski" class="poland-map-image">
            <div id="map-markers" class="map-markers"></div>
          </div>
          <div class="map-legend" aria-hidden="true">
            <span class="legend-dot"></span>
            <span>Aktywna sonda</span>
          </div>
        </div>
      </div>
    </section>

    <section class="list-panel">
      <h2>Elementy</h2>
      <ul id="elements-list" aria-label="Lista sond"></ul>
    </section>
  </main>

  <script>
    const probes = [
      { name: "Legionowo", lat: 52.4015, lng: 20.9261, offsetX: 0.15, offsetY: -0.9 },
      { name: "Bydgoszcz", lat: 53.1235, lng: 18.0084, offsetX: -1.15, offsetY: -0.55 },
      { name: "Wrocław", lat: 51.1079, lng: 17.0385, offsetX: -0.55, offsetY: 0.15 },
      { name: "NetIM", lat: 51.1079, lng: 17.0385, offsetX: 1.05, offsetY: -1.2, showInList: false },
      { name: "NetProfiler", lat: 51.1079, lng: 17.0385, offsetX: 1.9, offsetY: -0.2, showInList: false },
      { name: "Flow Gateway", lat: 51.1079, lng: 17.0385, offsetX: 1.1, offsetY: 1.0, showInList: false },
      { name: "Portal", lat: 51.1079, lng: 17.0385, offsetX: -0.15, offsetY: -1.45, showInList: false },
      { name: "Kraków", lat: 50.0647, lng: 19.945, offsetX: 0.45, offsetY: 0.7 },
      { name: "Gdynia", lat: 54.5189, lng: 18.5305, offsetX: -0.6, offsetY: -1.25 },
      { name: "Rakowiecka", lat: 52.2157, lng: 21.0152, offsetX: 0.35, offsetY: -0.15 },
      { name: "Wawelska", lat: 52.2166, lng: 20.9859, offsetX: -0.2, offsetY: 0.3 },
      { name: "Radiowa", lat: 52.2578, lng: 20.9131, offsetX: -0.9, offsetY: 0 },
      { name: "Opole", lat: 50.6751, lng: 17.9213, offsetX: 0.35, offsetY: 0.45 }
    ];

    const mapProjection = {
      north: 55.05,
      south: 49.0,
      west: 14.1,
      east: 24.25,
      paddingLeft: 8,
      paddingRight: 10,
      paddingTop: 7,
      paddingBottom: 9
    };

    const markersGroup = document.getElementById("map-markers");
    const list = document.getElementById("elements-list");
    const probeLinks = document.querySelectorAll(".probe-link");

    function projectProbePosition(probe) {
      const usableWidth = 100 - mapProjection.paddingLeft - mapProjection.paddingRight;
      const usableHeight = 100 - mapProjection.paddingTop - mapProjection.paddingBottom;
      const lngRatio = (probe.lng - mapProjection.west) / (mapProjection.east - mapProjection.west);
      const latRatio = (mapProjection.north - probe.lat) / (mapProjection.north - mapProjection.south);

      return {
        x: mapProjection.paddingLeft + (lngRatio * usableWidth) + (probe.offsetX || 0),
        y: mapProjection.paddingTop + (latRatio * usableHeight) + (probe.offsetY || 0)
      };
    }

    function render() {
      probes.forEach((probe) => {
        const position = projectProbePosition(probe);
        const marker = document.createElement("div");
        marker.className = "marker";
        marker.style.left = `${position.x}%`;
        marker.style.top = `${position.y}%`;
        marker.dataset.probe = probe.name;
        marker.tabIndex = 0;
        marker.setAttribute("role", "button");
        marker.setAttribute("aria-label", `Wybierz sondę ${probe.name}`);
        markersGroup.appendChild(marker);

        const label = document.createElement("div");
        label.className = "marker-label";
        label.style.left = `${position.x}%`;
        label.style.top = `${position.y}%`;
        label.dataset.probeLabel = probe.name;
        label.textContent = probe.name;
        label.tabIndex = 0;
        label.setAttribute("role", "button");
        label.setAttribute("aria-label", `Wybierz sondę ${probe.name}`);
        markersGroup.appendChild(label);

        if (probe.showInList !== false) {
          const item = document.createElement("li");
          const button = document.createElement("button");
          button.type = "button";
          button.className = "list-item";
          button.dataset.probe = probe.name;
          button.textContent = probe.name;
          item.appendChild(button);
          list.appendChild(item);
        }
      });
    }

    function highlightProbe(name) {
      document.querySelectorAll(".marker").forEach((marker) => {
        marker.classList.toggle("active", marker.dataset.probe === name);
      });

      document.querySelectorAll(".marker-label").forEach((label) => {
        label.classList.toggle("active", label.dataset.probeLabel === name);
      });

      document.querySelectorAll(".list-item").forEach((item) => {
        item.classList.toggle("active", item.dataset.probe === name);
      });

      document.querySelectorAll(".probe-link").forEach((link) => {
        link.classList.toggle("active", link.dataset.probe === name);
      });
    }

    function attachEvents() {
      markersGroup.addEventListener("click", (event) => {
        const target = event.target.closest(".marker, .marker-label");

        if (!target) {
          return;
        }

        highlightProbe(target.dataset.probe || target.dataset.probeLabel);
      });

      markersGroup.addEventListener("keydown", (event) => {
        if (event.key !== "Enter" && event.key !== " ") {
          return;
        }

        const target = event.target.closest(".marker, .marker-label");

        if (!target) {
          return;
        }

        event.preventDefault();
        highlightProbe(target.dataset.probe || target.dataset.probeLabel);
      });

      list.addEventListener("click", (event) => {
        if (event.target.matches(".list-item")) {
          highlightProbe(event.target.dataset.probe);
        }
      });

      probeLinks.forEach((link) => {
        link.addEventListener("click", () => {
          highlightProbe(link.dataset.probe);
        });
      });
    }

    render();
    attachEvents();
    highlightProbe("Legionowo");
  </script>
</body>
</html>
